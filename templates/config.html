<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 20px; color: #333; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 650px; width: 100%; }
        h1 { font-size: 22px; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 14px; color: #444; }
        input[type="url"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border 0.3s; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: #2ecc71; outline: none; }
        input[type="file"] { padding: 5px 0; font-size: 14px; }
        button { background: #2ecc71; color: white; border: none; padding: 14px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 25px; transition: background 0.2s; display: flex; justify-content: center; align-items: center; }
        button:hover { background: #27ae60; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        .error { color: #e74c3c; background: #fdedec; padding: 10px; border-radius: 6px; font-size: 14px; margin-top: 15px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; margin-right: 10px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚙️ Параметры проверки работ</h1>
        <form method="POST" enctype="multipart/form-data" onsubmit="handleStart(this)">

            <label for="sheet_url">Ссылка на Google Таблицу (доступ открыт всем по ссылке):</label>
            <input type="url" id="sheet_url" name="sheet_url" placeholder="https://google.com..." required>

            <label for="book_file">Выбрать файл книги (текст в формате .txt или .pdf):</label>
            <input type="file" id="book_file" name="book_file" accept=".txt, .pdf" required>

            <label for="model_id">Выберите модель Gemini:</label>
            <select id="model_id" name="model_id">
                {% for model in models %}
                    <option value="{{ model.id }}" {% if model.default %}selected{% endif %}>{{ model.name }}</option>
                {% endfor %}
            </select>

            <label for="user_prompt">Ваши инструкции для ИИ (критерии оценки):</label>
            <textarea id="user_prompt" name="user_prompt" rows="4" placeholder="Пример: Ставь оценку 'Зачет/Незачет'. Будь вежлив. Хвали за развернутые ответы..." required></textarea>

            {% if error %} <div class="error">{{ error }}</div> {% endif %}
            <button type="submit" id="start-btn">
                <div class="spinner" id="btn-spinner"></div>
                <span id="btn-text">Запустить автоматическую проверку</span>
            </button>
        </form>
    </div>

    <script>
        function handleStart(form) {
            const btn = document.getElementById('start-btn');
            const spinner = document.getElementById('btn-spinner');
            const text = document.getElementById('btn-text');
            btn.disabled = true;
            spinner.style.display = 'block';
            text.innerText = 'Загрузка книги и запуск...';
        }
    </script>
</body>
</html>
