<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выполнение проверки</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f7f6;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 700px;
            width: 100%;
        }
        h1 { font-size: 22px; margin-top: 0; color: #2c3e50; }
        .progress-container {
            width: 100%;
            background-color: #eaeded;
            border-radius: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 25px;
            background-color: #3498db;
            text-align: center;
            line-height: 25px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: width 0.4s ease;
        }
        #counter { font-size: 15px; color: #666; margin-bottom: 20px; }

        #log-container {
            background: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
        }
        .log-item {
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.4;
            border-left: 4px solid #cbd5e1;
            background: white;
        }
        .log-item.info { border-left-color: #3498db; background: #e8f4fd; }
        .log-item.success { border-left-color: #2ecc71; background: #eafaf1; font-weight: 500; }
        .log-item.error { border-left-color: #e74c3c; background: #fdedec; color: #c0392b; }

        .download-btn {
            display: none;
            background: #2ecc71;
            color: white;
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(46,204,113,0.2);
            transition: background 0.2s;
        }
        .download-btn:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="main-status">⏳ Выполняется проверка работ...</h1>

        <div class="progress-container">
            <div id="my-bar" class="progress-bar">0%</div>
        </div>

        <p id="counter">Обработано учеников: 0 из 0</p>

        <a href="/download" id="download-link" class="download-btn">📥 Скачать результаты проверки (.xlsx)</a>

        <h3>Журнал событий:</h3>
        <div id="log-container"></div>
    </div>

    <script>
        let renderedLogCount = 0;

        function updateProgress() {
            fetch('/get_progress')
                .then(response => response.json())
                .then(data => {
                    const bar = document.getElementById('my-bar');
                    const counter = document.getElementById('counter');
                    const logContainer = document.getElementById('log-container');
                    const downloadLink = document.getElementById('download-link');
                    const mainStatus = document.getElementById('main-status');

                    let percentage = 0;
                    if (data.total > 0) {
                        percentage = Math.round((data.current / data.total) * 100);
                    }

                    bar.style.width = percentage + '%';
                    bar.innerHTML = percentage + '%';
                    counter.innerHTML = `Обработано учеников: <b>${data.current}</b> из <b>${data.total}</b>`;

                    // Рендерим только новые строки логов
                    if (data.logs.length > renderedLogCount) {
                        for (let i = renderedLogCount; i < data.logs.length; i++) {
                            const rawLog = data.logs[i];
                            const div = document.createElement('div');
                            div.className = 'log-item';

                            if (rawLog.includes('Критическая') || rawLog.includes('Ошибка')) {
                                div.className += ' error';
                                div.innerHTML = '🛑 ' + rawLog;
                            } else if (rawLog.includes('checked') || rawLog.includes('завершена')) {
                                div.className += ' success';
                                div.innerHTML = '✅ ' + rawLog.replace('checked: ', '');
                            } else {
                                div.className += ' info';
                                div.innerHTML = '⚙️ ' + rawLog;
                            }

                            logContainer.appendChild(div);
                        }
                        renderedLogCount = data.logs.length;
                        logContainer.scrollTop = logContainer.scrollHeight;
                    }

                    // Железобетонная логика непрерывного опроса
                    if (data.status === 'completed') {
                        mainStatus.innerText = "🎉 Проверка успешно завершена!";
                        downloadLink.style.display = "block";
                    } else if (data.status === 'error') {
                        mainStatus.innerText = "❌ Произошла ошибка при выполнении";
                    } else {
                        // Продолжаем опрашивать сервер каждые 1.5 секунды
                        setTimeout(updateProgress, 1500);
                    }
                })
                .catch(err => {
                    console.error("Ошибка опроса статуса:", err);
                    setTimeout(updateProgress, 1500);
                });
        }
        updateProgress();
    </script>
</body>
</html>
