<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 40px 20px; color: #333; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; width: 100%; }
        h1 { font-size: 24px; margin-top: 0; color: #2c3e50; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 14px; }
        /* Стилизация кнопки выбора файла */
        input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: #fff; cursor: pointer; transition: border 0.3s; }
        input[type="file"]:focus { border-color: #3498db; outline: none; }
        button { background: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; transition: background 0.2s; display: flex; justify-content: center; align-items: center; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        .error { color: #e74c3c; background: #fdedec; padding: 10px; border-radius: 6px; font-size: 14px; margin-top: 15px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; margin-right: 10px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>🤖 Проверка работ с помощью ИИ</h1>
        <h3>Шаг 1: База API Ключей</h3>

        <!-- 🎯 Обязательно добавлен enctype="multipart/form-data" для передачи файлов во Flask -->
        <form method="POST" enctype="multipart/form-data" onsubmit="handleSubmit(this)">
            <label for="keys_file">Выберите текстовый файл со списком ключей Gemini:</label>

            <!-- 🎯 input изменен с "password" на "file" с ограничением accept=".txt" -->
            <input type="file" id="keys_file" name="keys_file" accept=".txt" required>

            {% if error %} <div class="error">{{ error }}</div> {% endif %}

            <button type="submit" id="submit-btn">
                <div class="spinner" id="btn-spinner"></div>
                <span id="btn-text">Загрузить ключи и войти</span>
            </button>
        </form>
    </div>

    <script>
        function handleSubmit(form) {
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('btn-spinner');
            const text = document.getElementById('btn-text');
            btn.disabled = true;
            spinner.style.display = 'block';
            text.innerText = 'Чтение и проверка ключей...';
        }
    </script>
</body>
</html>
