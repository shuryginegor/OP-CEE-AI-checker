name: Build Desktop App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Укажите вашу рабочую версию Python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyinstaller
      shell: bash

    - name: Build Executable with PyInstaller
      run: |
        # --onefile: собирает всё в один файл
        # --noconsole: скрывает черное окно терминала
        # --icon: добавляет иконку приложению
        # --add-data: копирует HTML-шаблоны внутрь сборки
        pyinstaller --onefile --noconsole --icon=icon.ico --add-data "templates:templates" main.py
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.os }}
        path: |
          dist/*.exe
          dist/main
          dist/*.app
